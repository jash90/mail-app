pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx}"
      run: bunx eslint {staged_files}
    format:
      glob: "*.{ts,tsx}"
      run: bunx prettier --write {staged_files} && git add {staged_files}

pre-push:
  commands:
    typecheck:
      run: bun run typecheck
    test:
      run: bun run test
